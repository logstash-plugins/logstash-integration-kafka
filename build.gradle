 buildscript {
    repositories {
        mavenCentral()
    }
}

plugins {
  id 'java'
  id 'maven-publish'
  id 'distribution'
  id 'idea'
}

group "org.logstash.integrations"

java {
  sourceCompatibility = JavaVersion.VERSION_1_8
}

// given https://docs.confluent.io/current/installation/versions-interoperability.html matrix
// Confluent Platform 7.4.x is Apache Kafka 3.4.x
String confluentKafkaVersion = '7.4.0'
String apacheKafkaVersion = '3.4.1'

repositories {
    mavenCentral()
    maven {
        // Confluent repo for kafka-avro-serializer
        url "https://packages.confluent.io/maven/"
    }
}

dependencies {
    implementation("io.confluent:kafka-avro-serializer:${confluentKafkaVersion}") {
        exclude group: 'org.apache.kafka', module:'kafka-clients'
    }
    // dependency of kafka-avro-serializer
    implementation("io.confluent:kafka-schema-serializer:${confluentKafkaVersion}") {
        exclude group: 'org.apache.kafka', module:'kafka-clients'
    }
    // dependency of kafka-avro-serializer
    implementation 'org.apache.avro:avro:1.11.3'
    // dependency of kafka-avro-serializer
    implementation("io.confluent:kafka-schema-registry-client:${confluentKafkaVersion}") {
        exclude group: 'org.apache.kafka', module:'kafka-clients'
    }
    implementation "org.apache.kafka:kafka-clients:${apacheKafkaVersion}"
    // slf4j, zstd, lz4-java, snappy are dependencies from "kafka-clients"
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'com.github.luben:zstd-jni:1.5.5-4'
    implementation 'org.lz4:lz4-java:1.8.0'
    implementation 'org.xerial.snappy:snappy-java:1.1.10.5'
    implementation 'software.amazon.msk:aws-msk-iam-auth:2.2.0'
    // transitive deps used by software.amazon.msk:aws-msk-iam-auth
    implementation 'commons-codec:commons-codec:1.15'
    implementation 'commons-logging:commons-logging:1.2'
    implementation 'io.netty:netty-buffer:4.1.108.Final'
    implementation 'io.netty:netty-codec-http2:4.1.108.Final'
    implementation 'io.netty:netty-codec-http:4.1.108.Final'
    implementation 'io.netty:netty-codec:4.1.108.Final'
    implementation 'io.netty:netty-common:4.1.108.Final'
    implementation 'io.netty:netty-handler:4.1.108.Final'
    implementation 'io.netty:netty-resolver:4.1.108.Final'
    implementation 'io.netty:netty-transport-classes-epoll:4.1.108.Final'
    implementation 'io.netty:netty-transport-native-unix-common:4.1.108.Final'
    implementation 'io.netty:netty-transport:4.1.108.Final'
    implementation 'org.apache.httpcomponents:httpclient:4.5.13'
    implementation 'org.apache.httpcomponents:httpcore:4.4.13'
    implementation 'org.reactivestreams:reactive-streams:1.0.4'
    implementation 'software.amazon.awssdk:annotations:2.26.8'
    implementation 'software.amazon.awssdk:apache-client:2.26.8'
    implementation 'software.amazon.awssdk:auth:2.26.8'
    implementation 'software.amazon.awssdk:aws-core:2.26.8'
    implementation 'software.amazon.awssdk:aws-json-protocol:2.26.8'
    implementation 'software.amazon.awssdk:aws-query-protocol:2.26.8'
    implementation 'software.amazon.awssdk:checksums-spi:2.26.8'
    implementation 'software.amazon.awssdk:checksums:2.26.8'
    implementation 'software.amazon.awssdk:endpoints-spi:2.26.8'
    implementation 'software.amazon.awssdk:http-auth-aws:2.26.8'
    implementation 'software.amazon.awssdk:http-auth-spi:2.26.8'
    implementation 'software.amazon.awssdk:http-auth:2.26.8'
    implementation 'software.amazon.awssdk:http-client-spi:2.26.8'
    implementation 'software.amazon.awssdk:identity-spi:2.26.8'
    implementation 'software.amazon.awssdk:json-utils:2.26.8'
    implementation 'software.amazon.awssdk:metrics-spi:2.26.8'
    implementation 'software.amazon.awssdk:netty-nio-client:2.26.8'
    implementation 'software.amazon.awssdk:profiles:2.26.8'
    implementation 'software.amazon.awssdk:protocol-core:2.26.8'
    implementation 'software.amazon.awssdk:regions:2.26.8'
    implementation 'software.amazon.awssdk:retries-spi:2.26.8'
    implementation 'software.amazon.awssdk:retries:2.26.8'
    implementation 'software.amazon.awssdk:sdk-core:2.26.8'
    implementation 'software.amazon.awssdk:sso:2.26.8'
    implementation 'software.amazon.awssdk:ssooidc:2.26.8'
    implementation 'software.amazon.awssdk:sts:2.26.8'
    implementation 'software.amazon.awssdk:third-party-jackson-core:2.26.8'
    implementation 'software.amazon.awssdk:utils:2.26.8'
    implementation 'software.amazon.eventstream:eventstream:1.0.1'
}
task generateGemJarRequiresFile {
    doLast {
        File jars_file = file('lib/logstash-integration-kafka_jars.rb')
        jars_file.newWriter().withWriter { w ->
            w << "# AUTOGENERATED BY THE GRADLE SCRIPT. DO NOT EDIT.\n\n"
            w << "require \'jar_dependencies\'\n"
            configurations.runtimeClasspath.allDependencies.each {
                w << "require_jar(\'${it.group}\', \'${it.name}\', \'${it.version}\')\n"
            }
        }
    }
}

task vendor {
    doLast {
        String vendorPathPrefix = "vendor/jar-dependencies"
        configurations.runtimeClasspath.allDependencies.each { dep ->
            File f = configurations.runtimeClasspath.filter { it.absolutePath.contains("${dep.group}/${dep.name}/${dep.version}") }.singleFile
            String groupPath = dep.group.replaceAll('\\.', '/')
            File newJarFile = file("${vendorPathPrefix}/${groupPath}/${dep.name}/${dep.version}/${dep.name}-${dep.version}.jar")
            newJarFile.mkdirs()
            Files.copy(f.toPath(), newJarFile.toPath(), REPLACE_EXISTING)
        }
    }
}

vendor.dependsOn(generateGemJarRequiresFile)
